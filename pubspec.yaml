name: krea
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  audioplayers: ^6.6.0
  supabase_flutter: ^2.5.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true
  
  assets: 
    - assets/logo.png
    - assets/Letras.png
    - assets/Palabras.png
    - assets/silabas.png
    - assets/cabeza.png
    - assets/Sonidos.png
    - assets/icon.png
    - assets/imagenes/
    - assets/audios/
    - assets/audios/silabas/
    - assets/palabras/
